# Development overrides – run with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# or simply:
#   make dev

services:
  db:
    # Override the unix_socket_directories='' command – that's only needed
    # on Proxmox LXC where socket creation is blocked.  On macOS/Linux dev
    # hosts it breaks pg_ctl during init ("no socket created for listening").
    command: postgres
    environment:
      POSTGRES_DB: botball
      POSTGRES_USER: botball
      POSTGRES_PASSWORD: botball
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    environment:
      APP_ENV: development
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: botball
      POSTGRES_USER: botball
      POSTGRES_PASSWORD: botball
      REDIS_URL: redis://redis:6379/0
    command: sh -c "alembic upgrade head && ADMIN_PASSWORD=admin1234 python scripts/create_admin.py --email admin@dev.local --name 'Dev Admin' --reset && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    labels: []

  frontend:
    image: node:20-alpine
    build:
      # Override the production nginx Dockerfile (which needs a pre-built dist/).
      context: ./frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api
    command: sh -c "corepack enable && pnpm install && pnpm dev --host"
    ports:
      - "5173:5173"
    labels: []

  traefik:
    profiles: ["skip-in-dev"]

volumes:
  frontend_node_modules:
