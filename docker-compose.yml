services:
  # ── Reverse Proxy ─────────────────────────────────────────────
  traefik:
    image: traefik:v2.11
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--certificatesresolvers.le.acme.email=${TRAEFIK_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    restart: unless-stopped

  # ── Database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    # Disable Unix-domain sockets: on Proxmox hosts Docker's /var/run tmpfs is
    # mounted root-owned so postgres (uid 70) can't create .s.PGSQL.5432 there.
    # All connections from the backend use TCP (postgresql+asyncpg://db:5432/…)
    # so Unix sockets are not needed.
    command: postgres -c unix_socket_directories=''
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-botball}
      POSTGRES_USER: ${POSTGRES_USER:-botball}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER:-botball}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Proxmox VE hosts block socket.socketpair() inside Docker containers via
    # their kernel/seccomp configuration. Python asyncio uses socketpair() for
    # its event loop self-pipe, so uvicorn cannot start without it.
    security_opt:
      - seccomp=unconfined
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-botball}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-botball}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  # ── Frontend ──────────────────────────────────────────────────
  # dist/ is pre-built on the host by scripts/proxmox-setup.sh before docker compose build
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

volumes:
  pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/db
  redisdata:
  uploads:
  letsencrypt:
